<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Icons in /public -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Basic SEO -->
    <title>Sonor</title>
    <meta
      name="description"
      content="Sonor client portal — projects, proposals, files, messaging, and billing."
    />
    <link rel="canonical" href="https://app.sonor.io/" />

    <!-- Social cards (Open Graph / Twitter) -->
    <meta property="og:title" content="Sonor" />
    <meta
      property="og:description"
      content="Review and sign proposals securely with embedded DocuSign."
    />
    <meta property="og:url" content="https://app.sonor.io/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:alt" content="Sonor" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sonor" />
    <meta
      name="twitter:description"
      content="Review and sign proposals securely with embedded DocuSign."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- PWA / theming (optional but nice) -->
    <meta name="theme-color" content="#4bbf39" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Performance: preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://www.google.com" />
    <link rel="preconnect" href="https://api.sonor.io" crossorigin />
    <link rel="dns-prefetch" href="https://api.sonor.io" />
    
    <!-- Inter font — loaded via <link> instead of CSS @import to avoid render-blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />

    <!-- Do NOT put CSP here; you already set it in /_headers -->
  </head>
  <body>
    <noscript>This site requires JavaScript to load the portal.</noscript>
    <div id="root"></div>
    
    <!-- Initial loading overlay — dark void matching boot sequence.
         No logo, no spinner. Just the dark canvas so there's zero visual
         discontinuity from first paint → React hydration → boot sequence.
         Fades out when React calls hideInitialLoader(). -->
    <div id="initial-loader">
      <style>
        #initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0a0a0f;
          z-index: 9999;
          opacity: 1;
          transition: opacity 0.3s ease-out;
        }
        #initial-loader.fade-out {
          opacity: 0;
          pointer-events: none;
        }
        #initial-loader .init-glow {
          width: 160px;
          height: 160px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(57,191,176,0.06) 0%, transparent 70%);
          animation: initPulse 2s ease-in-out infinite;
        }
        @keyframes initPulse {
          0%, 100% { opacity: 0.3; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(1.08); }
        }
      </style>
      <div class="init-glow"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
